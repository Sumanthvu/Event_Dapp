name: Easy Task
description: Small scoped issue suitable for first-time contributors
title: "[Easy]: "
labels:
  - difficulty:easy
  - good first issue
body:
  - type: markdown
    attributes:
      value: |
        Use this template for tasks that can be completed quickly with low risk.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What is wrong or missing today?
      placeholder: Describe the current gap.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Files and Scope
      description: List expected files to update.
      placeholder: |
        - event-dappp/src/...
        - event-ticketinng/src/...
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define exact done conditions.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: test-plan
    attributes:
      label: Test Plan
      description: How should contributors validate this?
      placeholder: npm test, manual UI check, graph build, etc.
    validations:
      required: true
